{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
    .add-product-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
    }
    
    .product-form-card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        overflow: hidden;
    }
    
    .card-header {
        background: linear-gradient(135deg, #28a745, #20c997);
        color: white;
        padding: 20px;
    }
    
    .card-header h3 {
        margin: 0;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .card-body {
        padding: 30px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
    }
    
    .form-group label .required {
        color: #dc3545;
    }
    
    .form-control {
        width: 100%;
        padding: 10px 15px;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: 0.95rem;
        transition: all 0.3s;
    }
    
    .form-control:focus {
        outline: none;
        border-color: #28a745;
        box-shadow: 0 0 0 3px rgba(40,167,69,0.1);
    }
    
    textarea.form-control {
        resize: vertical;
        min-height: 100px;
    }
    
    .image-preview {
        margin-top: 15px;
        text-align: center;
    }
    
    .image-preview img {
        max-width: 200px;
        max-height: 200px;
        border-radius: 10px;
        border: 2px solid #ddd;
        padding: 5px;
    }
    
    .btn-submit {
        background: linear-gradient(135deg, #28a745, #20c997);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        width: 100%;
    }
    
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(40,167,69,0.3);
    }
    
    .row {
        display: flex;
        gap: 20px;
        margin-bottom: 0;
    }
    
    .row .form-group {
        flex: 1;
    }
    
    @media (max-width: 768px) {
        .row {
            flex-direction: column;
            gap: 0;
        }
        .card-body {
            padding: 20px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="add-product-container">
    <div class="product-form-card">
        <div class="card-header">
            <h3>
                <i class="fas fa-plus-circle"></i>
                Add New Product
            </h3>
        </div>
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="row">
                    <div class="form-group">
                        <label>Product Name <span class="required">*</span></label>
                        <input type="text" name="name" class="form-control" placeholder="Enter product name" required>
                    </div>
                    
                    <div class="form-group">
                        <label>SKU (Stock Keeping Unit)</label>
                        <input type="text" name="sku" class="form-control" placeholder="Auto-generated if empty">
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>Category <span class="required">*</span></label>
                        <select name="category" class="form-control" required>
                            <option value="">Select Category</option>
                            {% for category in categories %}
                            <option value="{{ category.id }}">{{ category.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Brand <span class="required">*</span></label>
                        <select name="brand" class="form-control" required>
                            <option value="">Select Brand</option>
                            {% for brand in brands %}
                            <option value="{{ brand.id }}">{{ brand.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>Price <span class="required">*</span></label>
                        <input type="number" name="price" class="form-control" placeholder="₹ 0.00" step="0.01" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Stock Quantity <span class="required">*</span></label>
                        <input type="number" name="stock" class="form-control" placeholder="0" value="0" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Low Stock Threshold</label>
                    <input type="number" name="low_stock_threshold" class="form-control" placeholder="5" value="5">
                    <small class="text-muted">Alert when stock falls below this number</small>
                </div>
                
                <div class="form-group">
                    <label>Description <span class="required">*</span></label>
                    <textarea name="description" class="form-control" placeholder="Enter product description..." required></textarea>
                </div>
                
                <div class="form-group">
                    <label>Product Image <span class="required">*</span></label>
                    <input type="file" name="image" class="form-control" accept="image/*" onchange="previewImage(event)" required>
                    <div class="image-preview" id="imagePreview"></div>
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" name="is_active" value="true" checked>
                        Active (Available for sale)
                    </label>
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" name="is_featured" value="true">
                        Featured (Show on homepage)
                    </label>
                </div>
                
                <button type="submit" class="btn-submit">
                    <i class="fas fa-save"></i> Add Product
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    function previewImage(event) {
        const preview = document.getElementById('imagePreview');
        preview.innerHTML = '';
        
        if (event.target.files && event.target.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.createElement('img');
                img.src = e.target.result;
                preview.appendChild(img);
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    }
</script>
{% endblock %}
