{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-search"></i> Track Your Order</h4>
                </div>
                <div class="card-body">
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label>Order Number</label>
                            <input type="text" name="order_number" class="form-control" placeholder="Enter order ID" required>
                        </div>
                        <div class="mb-3">
                            <label>Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="Email used for order" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Track Order</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
