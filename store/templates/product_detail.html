{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-6">
            {% if product.image %}
            <img src="{{ product.image.url }}" alt="{{ product.name }}" class="img-fluid rounded">
            {% else %}
            <div class="no-image">
                <i class="fas fa-box-open"></i>
            </div>
            {% endif %}
        </div>
        
        <div class="col-md-6">
            <h2>{{ product.name }}</h2>
            <p class="text-muted">{{ product.category.name }} | {{ product.brand.name }}</p>
            <h3 class="text-primary">₹{{ product.price|floatformat:2 }}</h3>
            <p class="mt-3">{{ product.description }}</p>
            
            <div class="mt-4">
                <form method="POST" action="{% url 'add_to_cart' product.id %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-shopping-cart"></i> Add to Cart
                    </button>
                </form>
                
                <!-- ✅ WhatsApp Inquiry Button - Correct JavaScript -->
                <button class="btn btn-success btn-lg mt-3" onclick="sendWhatsAppMessage()">
                    <i class="fab fa-whatsapp"></i> Inquire on WhatsApp
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// ✅ Correct JavaScript Function
function sendWhatsAppMessage() {
    // Product details from Django template
    const productName = "{{ product.name|escapejs }}";
    const productPrice = "{{ product.price|floatformat:2 }}";
    const productUrl = window.location.href;
    
    // Build message
    let message = "Hello! I'm interested in this product:\n\n";
    message += "🛍️ Product: " + productName + "\n";
    message += "💰 Price: ₹" + productPrice + "\n";
    message += "🔗 Link: " + productUrl + "\n\n";
    message += "Please let me know more details.";
    
    // ✅ Use JavaScript's encodeURIComponent
    const phoneNumber = "917014172393"; // Replace with your number
    const encodedMessage = encodeURIComponent(message);
    const whatsappUrl = "https://wa.me/" + phoneNumber + "?text=" + encodedMessage;
    
    // Open WhatsApp
    window.open(whatsappUrl, '_blank');
}
</script>
{% endblock %}
